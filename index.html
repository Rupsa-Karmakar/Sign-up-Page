<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <style>
      body{
        background-color: hsl(48, 3%, 29%);
        font-family:cursive, 'Arial Narrow', Arial, Impact, Haettenschweiler, 'Arial Narrow Bold', Verdana, Geneva, Tahoma, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        padding:0%;
        height: 100vh;
      }
      .card{
        background-color: #eae3ea;
        border-radius: 10px;
        padding: 30px;
        width: 305px;
        border: #131313;
        height: 400px;
      }
      
      h2{
        width: 105px;
        height: 30px;
        margin: 20px auto;
         padding: 10px;
        background-color: #d9ded7;
        border-radius:5px;
        border: 2px solid #0d0f0e;
        color:#1b1d1b;
        text-align: center;
        margin-bottom: 45px;
        font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif, Courier, monospace, 'Arial Narrow', Arial, sans-serif, 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif, 'Arial Narrow', Arial, sans-serif, Helvetica, sans-serif, 'Arial Narrow', Arial, Impact, Haettenschweiler, 'Arial Narrow Bold', Verdana, Geneva, Tahoma, sans-serif;
      }
      form{
        display: flex;
        flex-direction: column;
      }
      input{
        background-color: #e6f3f0;
        margin-bottom: 15px;
        border-radius: 15px;
        padding:15px;
        box-sizing: border-box;
        border: 1px solid #0d0f0e;
        font-family:Arial, Helvetica, sans-serif, 'Arial Narrow', Arial, Impact, Haettenschweiler, 'Arial Narrow Bold', Verdana, Geneva, Tahoma, sans-serif;
      }
      input:hover{
        background-color: #87c8c8;
        color:#150101
        
      }
      button{
        display: block;
        margin: 20px auto;
        background-color: #62e059;
        color: #150101;
        padding: 10px;
        border-radius: 100px;
        font-family:Arial, Helvetica, sans-serif, 'Arial Narrow', Arial, Impact, Haettenschweiler, 'Arial Narrow Bold', Verdana, Geneva, Tahoma, sans-serif;
        width: 100px;
        
      }
      .name{
        display: flex;
        gap: 15px;
      }
      .name input{
        width: 100%;
      }
      .password{
        display: flex;
        gap: 15px;  
      }
      .passowrd input{
        width: 100%;
      }
      button:hover{
        background-color: #7aaedb;
        color: #271717;
        cursor: pointer;

      }
    </style>
</head>
<body>
    <div class="card">
      <h2>Sign Up</h2>
      <form>
        <input type="email" name="" id="" placeholder="Email"/>
        <div class="name">
          <input type="text" name="" id="" placeholder="First name"/>
        <input type="text" name="" id="" placeholder="Last name"/>

        </div>
       
        <input type="password" name="" id="" placeholder="Password"/>
        <button type="submit">Sign Up</button>
      </form>
      </div>  
</body>
</html>
